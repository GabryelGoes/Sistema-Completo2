<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>REI DO ABS</title>
    
    <!-- PWA Configs -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="REI DO ABS" />
    
    <!-- Novo Ícone -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            colors: {
              brand: {
                yellow: '#F5D00B',
                dark: '#0A0A0A',
                surface: '#121212',
                surfaceHighlight: '#1C1C1E',
                border: '#2C2C2E',
              },
              light: {
                page: '#f2f2f7',
                card: '#e8e8ed',
                elevated: '#ffffff',
                border: '#d1d1d6',
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #f2f2f7;
        color: #1c1c1e;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: none; /* Previne pull-to-refresh nativo no mobile */
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      .dark body {
        background-color: #000000;
        color: #ffffff;
      }
      
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #e5e5ea; 
      }
      .dark ::-webkit-scrollbar-track {
        background: #000; 
      }
      ::-webkit-scrollbar-thumb {
        background: #c7c7cc; 
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #333; 
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #aeaeb2; 
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }

      /* Modais — estilo iOS 17 (backdrop + sheet) */
      @keyframes modal-backdrop-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes modal-sheet-in {
        from {
          opacity: 0;
          transform: scale(0.94) translateY(24px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .animate-modal-backdrop {
        animation: modal-backdrop-in 0.35s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      }
      .animate-modal-sheet {
        animation: modal-sheet-in 0.42s cubic-bezier(0.32, 0.72, 0, 1) forwards;
      }

      /* Modo cinematográfico: embaça placas para gravação de tela / redes sociais */
      .blur-plate {
        filter: blur(8px);
        -webkit-filter: blur(8px);
        user-select: none;
        display: inline-block;
        min-width: 2ch;
        letter-spacing: 0.1em;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
